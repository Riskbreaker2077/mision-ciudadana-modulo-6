<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Misión Ciudadana | Módulo 6</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #f3f7ff 0%, #e8f5ef 100%);
      color: #122033;
    }
    main {
      max-width: 720px;
      margin: 24px;
      padding: 40px 32px;
      background: rgba(255,255,255,.88);
      border: 1px solid rgba(18,32,51,.08);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(18,32,51,.10);
    }
    .eyebrow {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: #dff2e6;
      color: #0c6b42;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .02em;
      text-transform: uppercase;
    }
    h1 { font-size: clamp(2.2rem, 5vw, 4rem); margin: 16px 0 12px; line-height: 1; }
    p { font-size: 1.08rem; line-height: 1.6; margin: 0 0 16px; }
    .cta {
      display: inline-block;
      margin-top: 12px;
      padding: 14px 18px;
      border-radius: 14px;
      background: #122033;
      color: white;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <span class="eyebrow">Próximamente</span>
    <h1>Misión Ciudadana<br>Módulo 6</h1>
    <p>Este espacio ya quedó reservado para la publicación del Módulo 6 de Misión Ciudadana.</p>
    <p>La página principal completa se cargará en la siguiente actualización.</p>
    <a class="cta" href="https://github.com/Riskbreaker2077/mision-ciudadana-modulo-6">Ver repositorio</a>
  </main>
</body>
</html>
